openapi: 3.0.0
info:
  title: Todo Management API
  description: |
    待办事项管理 REST API，支持用户注册、登录及个人待办的增删改查。

    ## 变更内容
    1. **登录用户名大小写处理**：登录接口用户名不区分大小写，统一转换为小写进行匹配，与注册行为保持一致。
    2. **增加通用更新端点**：将 PATCH /todos/{todo_id} 扩展为通用更新端点，支持修改 title、description、due_date、completed 字段。
    3. **标记完成幂等性与版本号逻辑**：补充了在更新 completed 字段时的幂等性规则（若已完成且版本号匹配则直接返回成功，version 不变）以及版本号不匹配时的 409 冲突处理。
    4. **补充 400 错误响应**：为 DELETE /todos/{todo_id}、PATCH /todos/{todo_id}、GET /todos/{todo_id} 添加了缺失的 400 响应；完善了注册接口的 400 错误示例（包含用户名和密码两种验证失败场景）。
    5. **字段长度约束**：为 CreateTodoRequest 和 Todo 中的 title（最大 255 字符）和 description（最大 1000 字符）添加 maxLength 约束。
    6. **分页计算公式**：明确 total_pages 的计算方式为 ceil(total / page_size)，且当 total=0 时 total_pages=0。
    7. **JWT 补充说明**：在安全方案中补充了签名算法（HS256）、有效期（24小时）及暂不支持刷新的说明。
    8. **统一版本号传递方式**：所有需要乐观锁版本号的操作（完成/更新、删除）均通过请求体 JSON 传递，并对 version 字段添加 minimum:1 约束。
    9. **ErrorResponse.code 含义**：明确 code 字段保持与 HTTP 状态码一致，消除冗余与歧义。
    10. **幂等性规则澄清与完善**：明确 PATCH 幂等性规则：仅当请求体中除 version 外只包含 completed:true 或 completed:false 且当前状态与请求一致且版本号匹配时，跳过数据修改（version 不变）；若同时包含其他字段，则正常更新所有字段并递增 version 号。同时补充了 completed:false 的对称幂等性规则。
    11. **补充更新请求字段约束**：在 UpdateTodoRequest 中明确要求至少提供一个要更新的字段（除 version 外），否则返回 400；并在 400 响应中增加了对应示例。
    12. **description 字段支持 null**：在 UpdateTodoRequest 的 description 属性中增加了 nullable:true，允许通过 null 清除描述，与 due_date 的处理保持一致。
  version: 3.0.0
servers:
  - url: /api/v1
    description: API 基础路径
paths:
  /auth/register:
    post:
      summary: 用户注册
      description: 使用用户名和密码注册新账号。用户名存储为小写，密码加密存储。
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: User1
              password: Pass1234
      responses:
        '201':
          description: 注册成功，返回用户基本信息（密码不回传）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
              example:
                id: 1
                username: user1
        '400':
          description: 请求参数校验失败（用户名或密码不符合规则）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                usernameError:
                  summary: 用户名格式错误
                  value:
                    code: 400
                    message: username must be 3-20 characters, allowing letters, digits and underscores
                passwordError:
                  summary: 密码格式错误
                  value:
                    code: 400
                    message: password must be at least 8 characters, containing both letters and digits
        '409':
          description: 用户名已存在（不区分大小写）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 409
                message: username already exists
        '5XX':
          $ref: '#/components/responses/ServerError'
  /auth/login:
    post:
      summary: 用户登录
      description: 已注册用户使用用户名和密码登录，获取 JWT Token。登录时用户名不区分大小写，服务端会将其转为小写后再进行比对。
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: User1
              password: Pass1234
      responses:
        '200':
          description: 登录成功，返回 JWT Token 和用户基本信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIs...
                user:
                  id: 1
                  username: user1
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                message: invalid username or password
        '5XX':
          $ref: '#/components/responses/ServerError'
  /todos:
    get:
      summary: 获取待办事项列表
      description: 认证用户获取自己的待办列表，按创建时间倒序，支持分页。
      tags:
        - Todos
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 当前页码，从1开始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          description: 每页条目数，1~100
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 成功返回待办列表及分页元数据。超页时 items 为空数组，page 保持请求值。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'
              example:
                items:
                  - id: 1
                    title: 完成PRD
                    description: 撰写技术规格
                    due_date: '2025-03-01'
                    completed: false
                    created_at: '2025-02-20T10:00:00Z'
                    updated_at: '2025-02-20T10:00:00Z'
                    version: 1
                    user_id: 1
                total: 1
                page: 1
                page_size: 20
                total_pages: 1
        '400':
          description: 分页参数不符合范围（page<1 或 page_size<1/ >100）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: page must be >= 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/ServerError'
    post:
      summary: 创建待办事项
      description: 认证用户创建一条新的待办事项。标题必填，描述和截止日期可选。
      tags:
        - Todos
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
            example:
              title: 完成PRD
              description: 撰写技术规格
              due_date: '2025-03-01'
      responses:
        '201':
          description: 待办创建成功，返回完整的待办对象
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: 1
                title: 完成PRD
                description: 撰写技术规格
                due_date: '2025-03-01'
                completed: false
                created_at: '2025-02-20T10:00:00Z'
                updated_at: '2025-02-20T10:00:00Z'
                version: 1
                user_id: 1
        '400':
          description: 请求体校验失败（title为空、title/description超长、due_date格式错误等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: title is required
        '401':
          $ref: '#/components/responses/Unauthorized'
        '5XX':
          $ref: '#/components/responses/ServerError'
  /todos/{todo_id}:
    get:
      summary: 获取待办事项详情
      description: 认证用户获取单个待办的详细信息。只能访问自己的待办。
      tags:
        - Todos
      security:
        - BearerAuth: []
      parameters:
        - name: todo_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功返回待办对象
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '400':
          description: todo_id 格式无效（非整数或越界）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: invalid todo_id format
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 待办属于其他用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                message: forbidden: todo belongs to another user
        '404':
          description: 待办不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: todo not found
        '5XX':
          $ref: '#/components/responses/ServerError'
    patch:
      summary: 更新待办事项
      description: |
        认证用户更新自己的待办中的任意字段（title、description、due_date、completed）。支持部分更新。
        使用乐观锁版本号防止并发冲突。

        幂等性说明（针对 completed 字段）：
        - 若请求体中除 version 外只包含 completed:true，且当前待办已完成（completed=true）且版本号匹配，则直接返回成功（HTTP 200），
          但不做任何数据修改（version 保持不变）。
        - 若请求体中除 version 外只包含 completed:false，且当前待办未完成（completed=false）且版本号匹配，则同样直接返回成功，version 不变。
        - 若请求中同时携带 completed 字段和其他字段（如 title、description、due_date），则无论 completed 是否与当前状态一致，
          均正常更新所有请求中包含的字段，并递增 version 号。
        - 若版本号不匹配，返回 409 Conflict。
      tags:
        - Todos
      security:
        - BearerAuth: []
      parameters:
        - name: todo_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
            example:
              title: 完成PRD更新
              completed: true
              version: 1
      responses:
        '200':
          description: 更新成功，返回更新后的待办对象
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: 1
                title: 完成PRD更新
                description: 撰写技术规格
                due_date: '2025-03-01'
                completed: true
                created_at: '2025-02-20T10:00:00Z'
                updated_at: '2025-02-20T11:00:00Z'
                version: 2
                user_id: 1
        '400':
          description: 请求体验证失败（如 version 缺失、字段格式错误、长度超限、仅传 version 等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                versionMissing:
                  summary: version 字段缺失
                  value:
                    code: 400
                    message: version is required
                onlyVersion:
                  summary: 除 version 外未提供任何更新字段
                  value:
                    code: 400
                    message: at least one field to update (other than version) must be provided
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 待办属于其他用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                message: forbidden: todo belongs to another user
        '404':
          description: 待办不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: todo not found
        '409':
          description: 并发冲突（版本号不匹配）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 409
                message: resource conflict due to version mismatch
        '5XX':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: 删除待办事项
      description: 认证用户删除自己的某个待办。使用乐观锁版本号防止并发删除。
      tags:
        - Todos
      security:
        - BearerAuth: []
      parameters:
        - name: todo_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteTodoRequest'
            example:
              version: 1
      responses:
        '204':
          description: 删除成功，无内容
        '400':
          description: 请求体验证失败（如 version 缺失、version 不满足最小值等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                message: version is required and must be >= 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 待办属于其他用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 403
                message: forbidden: todo belongs to another user
        '404':
          description: 待办不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: todo not found
        '409':
          description: 并发冲突（版本号不匹配）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 409
                message: resource conflict due to version mismatch
        '5XX':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        使用 JWT Token 进行身份认证，在请求头中携带 `Authorization: Bearer {token}`。
        Token 签名算法为 HS256，有效期 24 小时。当前暂不支持 Token 刷新，过期后需重新登录获取。
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: "与 HTTP 响应状态码保持一致，例如 400 表示请求错误，401 表示未认证等。后续可根据需要扩展为业务错误码。"
          example: 400
        message:
          type: string
          description: 错误描述信息
          example: Bad request
    UserPublic:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: integer
          description: 用户 ID
          example: 1
        username:
          type: string
          description: 用户名（小写）
          example: user1
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: '用户名，允许大小写字母、数字、下划线，长度3-20个字符。存储时统一转为小写。'
          pattern: '^[a-zA-Z0-9_]{3,20}$'
          example: User1
        password:
          type: string
          description: '密码，最小长度8位，必须包含字母和数字。'
          minLength: 8
          pattern: '^(?=.*[a-zA-Z])(?=.*\d).{8,}$'
          example: Pass1234
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: '用户名，不区分大小写。服务端在比对前会统一转换为小写。'
          example: user1
        password:
          type: string
          example: Pass1234
    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: JWT 访问令牌，有效期24小时，签名算法为 HS256。暂不支持刷新。
          example: eyJhbGciOiJIUzI1NiIs...
        user:
          $ref: '#/components/schemas/UserPublic'
    Todo:
      type: object
      required:
        - id
        - title
        - completed
        - created_at
        - updated_at
        - version
        - user_id
      properties:
        id:
          type: integer
          description: 待办 ID
          example: 1
        title:
          type: string
          description: 标题（最大 255 字符）
          maxLength: 255
          example: 完成PRD
        description:
          type: string
          nullable: true
          description: 描述（可选，最大 1000 字符）
          maxLength: 1000
          example: 撰写技术规格
        due_date:
          type: string
          format: date
          nullable: true
          description: 截止日期，格式 YYYY-MM-DD
          example: '2025-03-01'
        completed:
          type: boolean
          description: 是否已完成
          example: false
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: '2025-02-20T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: 最后更新时间
          example: '2025-02-20T10:00:00Z'
        version:
          type: integer
          description: 乐观锁版本号，每次更新递增 (最小值 1)
          minimum: 1
          example: 1
        user_id:
          type: integer
          description: 所属用户 ID
          example: 1
    CreateTodoRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          description: 标题，不能为空（最大 255 字符）
          minLength: 1
          maxLength: 255
          example: 完成PRD
        description:
          type: string
          description: 描述（可选，最大 1000 字符）
          maxLength: 1000
          example: 撰写技术规格
        due_date:
          type: string
          format: date
          description: 截止日期，格式 YYYY-MM-DD（可选）
          example: '2025-03-01'
    UpdateTodoRequest:
      type: object
      description: 待办更新请求体。version 为必填，其他字段均为可选。至少应提供一个要更新的字段（除 version 外）。
      required:
        - version
      properties:
        version:
          type: integer
          minimum: 1
          description: 待办的当前版本号，服务端验证一致后才允许更新并递增版本号。
          example: 1
        title:
          type: string
          description: 新标题（不能为空，最大 255 字符）
          minLength: 1
          maxLength: 255
          example: 完成PRD更新
        description:
          type: string
          nullable: true
          description: 新描述（最大 1000 字符，可设为 null 清除现有描述）
          maxLength: 1000
          example: 更新后的描述
        due_date:
          type: string
          format: date
          nullable: true
          description: 新截止日期，格式 YYYY-MM-DD（设为 null 可清除现有日期）
          example: '2025-04-01'
        completed:
          type: boolean
          description: 完成状态（true 或 false）
          example: true
    DeleteTodoRequest:
      type: object
      description: 删除待办时需要提供当前版本号用于乐观锁冲突检测。
      required:
        - version
      properties:
        version:
          type: integer
          minimum: 1
          description: 待办的当前版本号，服务端验证一致后才允许删除。
          example: 1
    TodoListResponse:
      type: object
      required:
        - items
        - total
        - page
        - page_size
        - total_pages
      properties:
        items:
          type: array
          description: 当前页的待办列表
          items:
            $ref: '#/components/schemas/Todo'
        total:
          type: integer
          description: 总记录数
          example: 42
        page:
          type: integer
          description: 当前页码
          example: 1
        page_size:
          type: integer
          description: 每页条目数
          example: 20
        total_pages:
          type: integer
          description: '总页数，计算公式为 ceil(total / page_size)。当 total = 0 时，total_pages = 0。'
          example: 3
  responses:
    Unauthorized:
      description: 未提供 Token、Token 无效或已过期
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: unauthorized
    ServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 500
            message: internal server error