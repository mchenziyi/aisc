openapi: 3.0.0
info:
  title: AI Video Platform API
  version: 2.0.0
  description: |
    专注人工智能领域的视频分享平台。

    **认证**：大多数接口需要在请求头中添加 `Authorization: Bearer <token>`，但以下接口除外：注册、登录、刷新 Token，以及视频列表和详情（未登录可访问，登录可获更多信息）。
    分页：列表接口使用 `page`、`page_size` 查询参数；响应中 `data` 对象内包含 `items`、`total`、`page`、`page_size`。
    响应体：成功统一返回 `{ "code": 0, "data": ..., "message": "ok" }`，错误时 `code` 为非零业务错误码（10000+），`message` 为错误描述。

    ## v2.0.0 变更说明
    - 修正 `VideoListResponse` 结构：`total`、`page`、`page_size` 移入 `data` 字段内（`data.items`、`data.total`、`data.page`、`data.page_size`），统一响应包裹。
    - 显式定义 `UploadTokenResponse.fields` 结构，包含 `key`、`policy`、`signature`、`accessKeyId` 等字段，并提供示例。
    - 重新设计 `POST /videos` 校验流程：同步检测文件元数据后创建记录，异步转码，视频详情增加 `status` 字段（`processing`/`available`/`failed`）。
    - 统一 `tags` 字段类型为字符串数组，`maxItems:5`，`items.maxLength:20`，与 `VideoDetail.tags` 保持一致。
    - `CreateVideoRequest` 增加对 `uploadId` 对应文件状态的校验（是否上传、大小、MIME 是否匹配），补充错误码 `422`。
    - 新增用户管理接口：`GET /user/profile`、`PUT /user/profile`、`PUT /user/password`、`POST /auth/refresh`。
    - 将 `updateVideo` 的 HTTP 方法从 `PUT` 改为 `PATCH`，请求体描述反映部分更新。
    - 取消 `GET /videos` 和 `GET /videos/{id}` 的强制认证：允许未登录用户访问，已登录用户可额外获得收藏状态等信息。
    - 列表接口（`GET /videos`、`GET /favorites`）添加排序参数 `sort_by`、`order`，补充 `keyword` 搜索范围为标题、描述、标签。
    - 明确删除视频的级联行为（同步删除存储文件、收藏记录等），`/videos/{id}` 中 `id` 约束为 UUID 格式，统一成功消息为 `'ok'`，定义独立业务错误码体系（10000+）。

servers:
  - url: /
    description: 默认服务器

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    VideoSummary:
      type: object
      properties:
        id:
          type: string
          description: 视频ID
        title:
          type: string
          description: 视频标题
        uploaderName:
          type: string
          description: 上传者用户名
        coverUrl:
          type: string
          format: uri
          description: 封面URL（一期使用统一默认封面）
        favoritesCount:
          type: integer
          description: 收藏数量
        uploadTime:
          type: string
          format: date-time
          description: 上传时间
        isFavorited:
          type: boolean
          description: 当前请求用户是否已收藏；未登录时返回false
      required:
        - id
        - title
        - uploaderName
        - coverUrl
        - favoritesCount
        - uploadTime
        - isFavorited

    VideoDetail:
      allOf:
        - $ref: '#/components/schemas/VideoSummary'
        - type: object
          properties:
            description:
              type: string
              maxLength: 500
              description: 视频描述
            tags:
              type: array
              items:
                type: string
                maxLength: 20
              maxItems: 5
              description: 标签列表
            playUrl:
              type: string
              format: uri
              description: 临时播放URL（预签名，有效期1小时）
            status:
              type: string
              enum: [processing, available, failed]
              description: 视频状态（processing: 转码中, available: 可播放, failed: 转码失败）
          required:
            - status

    VideoListResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
          description: 成功标识
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/VideoSummary'
            total:
              type: integer
              description: 总记录数
            page:
              type: integer
              description: 当前页码
            page_size:
              type: integer
              description: 每页记录数
          required:
            - items
            - total
            - page
            - page_size
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    VideoDetailResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        data:
          $ref: '#/components/schemas/VideoDetail'
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱地址
        password:
          type: string
          minLength: 6
          description: 密码（至少6位）

    LoginRequest:
      type: object
      required:
        - usernameOrEmail
        - password
      properties:
        usernameOrEmail:
          type: string
          description: 用户名或邮箱
        password:
          type: string
          description: 密码

    AuthResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT Token
            user:
              type: object
              properties:
                id:
                  type: string
                username:
                  type: string
                email:
                  type: string
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    UploadTokenRequest:
      type: object
      required:
        - filename
        - fileSize
        - mimeType
      properties:
        filename:
          type: string
          description: 文件名，需包含扩展名（如 .mp4）
        fileSize:
          type: integer
          format: int64
          minimum: 1
          maximum: 524288000
          description: 文件大小，单位字节，不超过500MB
        mimeType:
          type: string
          enum: [video/mp4]
          description: 文件MIME类型，仅支持 video/mp4

    UploadTokenResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        data:
          type: object
          properties:
            uploadUrl:
              type: string
              format: uri
              description: 预签名上传地址
            fields:
              type: object
              properties:
                key:
                  type: string
                  description: 对象存储中的文件路径
                policy:
                  type: string
                  description: 上传策略（Base64编码的JSON）
                signature:
                  type: string
                  description: 签名
                accessKeyId:
                  type: string
                  description: 访问密钥ID
              required:
                - key
                - policy
                - signature
              description: 上传所需的凭证字段，至少包含 key、policy、signature
              example:
                key: "videos/2025/03/abc.mp4"
                policy: "eyJleHBpcmF0aW9uIjoiMjAyNS0wMy0wMVQwMDowMDowMFoiLCJjb25kaXRpb25zIjpbeyJidWNrZXQiOiJ2aWRlby11cGxvYWRzIn0seyJrZXkiOiJ2aWRlb3MvYWJjLm1wNCJ9XX0="
                signature: "random signature"
                accessKeyId: "AKIDEXAMPLE"
            uploadId:
              type: string
              description: 上传标识，用于后续创建视频时关联文件
          required:
            - uploadUrl
            - fields
            - uploadId
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    CreateVideoRequest:
      type: object
      required:
        - title
        - uploadId
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 视频标题
        description:
          type: string
          maxLength: 500
          description: 视频描述（可选）
        tags:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 5
          description: 标签列表，最多5个，每个标签不超过20个字符
        uploadId:
          type: string
          description: 上传凭证返回的上传标识，对应已上传的文件

    CreateVideoResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        data:
          type: object
          properties:
            id:
              type: string
              description: 新创建的视频ID
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    UpdateVideoRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 视频标题
        description:
          type: string
          maxLength: 500
          description: 视频描述
        tags:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 5
          description: 标签列表，最多5个，每个标签不超过20个字符
      minProperties: 1

    EmptyResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        data:
          nullable: true
          default: null
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    FavoriteToggleResponse:
      type: object
      properties:
        code:
          type: integer
          enum: [0]
        data:
          type: object
          properties:
            favorited:
              type: boolean
              description: 操作后的收藏状态（true为已收藏）
            favoritesCount:
              type: integer
              description: 该视频的最新收藏数
          required:
            - favorited
            - favoritesCount
        message:
          type: string
          example: "ok"
      required:
        - code
        - data
        - message

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 业务错误码，成功为0，业务错误码范围为10000-19999
          example: 10001
        data:
          nullable: true
        message:
          type: string
          description: 错误描述
      required:
        - code
        - data
        - message

    # 新增 Schema
    UserProfile:
      type: object
      properties:
        id:
          type: string
          description: 用户唯一标识
        username:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱地址
        createdAt:
          type: string
          format: date-time
          description: 注册时间
      required:
        - id
        - username
        - email
        - createdAt

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
          description: 新用户名
        email:
          type: string
          format: email
          description: 新邮箱地址
      minProperties: 1

    UpdatePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          description: 旧密码
        newPassword:
          type: string
          minLength: 6
          description: 新密码（至少6位）

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: 刷新令牌

  responses:
    Unauthorized:
      description: 未认证（Token缺失或无效）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 10003
            data: null
            message: "Authentication required"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 10004
            data: null
            message: "Resource not found"
    ValidationError:
      description: 输入校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 10001
            data: null
            message: "Validation failed"
    TooManyRequests:
      description: 请求频率过高，请稍后再试
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 10005
            data: null
            message: "Too many requests"
    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 10006
            data: null
            message: "Internal server error"

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: 用户注册
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: 用户名或邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10002
                data: null
                message: "用户名或邮箱已存在"
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security: []

  /auth/login:
    post:
      tags: [Authentication]
      summary: 用户登录
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10003
                data: null
                message: "用户名或密码错误"
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security: []

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: 刷新 Token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 刷新令牌无效或过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10003
                data: null
                message: "Invalid or expired refresh token"
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /uploads/token:
    post:
      tags: [Video Upload]
      summary: 获取预签名上传凭证
      operationId: getUploadToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadTokenRequest'
      responses:
        '200':
          description: 凭证获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: 输入校验失败（如文件大小超过500MB或非MP4类型）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10001
                data: null
                message: "文件大小不能超过500MB"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /videos:
    post:
      tags: [Video Upload]
      summary: 创建视频记录
      operationId: createVideo
      description: |
        创建视频记录。接口会同步校验对应的上传文件是否存在、文件大小和MIME是否与申请凭证时一致。
        校验通过后创建视频记录（状态为 processing）并返回视频ID。
        后续可通过 GET /videos/{id} 查看视频状态，转码完成后状态变为 available。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVideoRequest'
      responses:
        '201':
          description: 视频创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateVideoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: 校验失败（字段超限、文件未上传、文件信息不匹配等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10001
                data: null
                message: "文件未上传"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    get:
      tags: [Video Browsing and Search, Video Management]
      summary: 获取视频列表
      operationId: listVideos
      description: |
        获取视频列表，支持关键字搜索、分页、排序。
        未登录用户可访问；已登录用户可在请求头携带 Bearer Token 以获取额外信息（如收藏状态）及使用 owner=me 参数筛选自己上传的视频。
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 100
          description: 搜索关键词，在标题、描述和标签中搜索（可选）
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 当前页码
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 每页记录数
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [uploadTime, favoritesCount, title]
            default: uploadTime
          description: 排序字段，默认按上传时间排序
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: 排序方向，默认降序
        - name: owner
          in: query
          schema:
            type: string
            enum: [me]
          description: 设为 "me" 时筛选当前用户上传的视频（需要登录）
      responses:
        '200':
          description: 成功返回视频列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: 参数校验失败（如关键词超长）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10001
                data: null
                message: "关键词长度不能超过100字符"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /videos/{id}:
    get:
      tags: [Video Detail]
      summary: 获取视频详情
      operationId: getVideoById
      description: |
        根据视频ID获取视频详情。
        未登录用户可访问；已登录用户可获得 isFavorited 等个性化字段。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          description: 视频ID（UUID格式）
      responses:
        '200':
          description: 成功返回视频详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [Video Management]
      summary: 部分更新视频信息
      operationId: partialUpdateVideo
      description: |
        部分更新视频信息。只有视频的上传者可以操作。
        仅需在请求体中包含需要修改的字段。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          description: 视频ID（UUID格式）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVideoRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 无权限（不是自己上传的视频）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10007
                data: null
                message: "You are not the owner of this video"
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    delete:
      tags: [Video Management]
      summary: 删除视频
      operationId: deleteVideo
      description: |
        删除视频及其关联资源，包括：
        - 存储在对象存储中的原始文件和转码文件
        - 所有收藏记录
        只有视频的上传者可以执行此操作。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          description: 视频ID（UUID格式）
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 无权限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10007
                data: null
                message: "You are not the owner of this video"
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /videos/{id}/favorite:
    post:
      tags: [Favorite Management]
      summary: 切换收藏状态
      operationId: toggleFavorite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          description: 视频ID（UUID格式）
      responses:
        '200':
          description: 切换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteToggleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /favorites:
    get:
      tags: [Favorite Management]
      summary: 获取用户收藏列表
      operationId: listFavorites
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 当前页码
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 每页记录数
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [uploadTime, favoritesCount, title]
            default: uploadTime
          description: 排序字段，默认按上传时间排序
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: 排序方向，默认降序
      responses:
        '200':
          description: 收藏列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /user/profile:
    get:
      tags: [User Management]
      summary: 获取个人资料
      operationId: getUserProfile
      responses:
        '200':
          description: 成功返回个人资料
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  data:
                    $ref: '#/components/schemas/UserProfile'
                  message:
                    type: string
                    example: "ok"
                required:
                  - code
                  - data
                  - message
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    put:
      tags: [User Management]
      summary: 更新个人资料
      operationId: updateUserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /user/password:
    put:
      tags: [User Management]
      summary: 修改密码
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: 密码修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          description: 旧密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 10003
                data: null
                message: "旧密码错误"
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []
